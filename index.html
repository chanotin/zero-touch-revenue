<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Small Offer Lab</title>
  <meta name="description" content="小さなデジタル商品を試す場所. Updated 2026-06-19 17:48:15.">
  <meta property="og:type" content="product">
  <meta property="og:site_name" content="Small Offer Lab">
  <meta property="og:title" content="Small Offer Lab">
  <meta property="og:description" content="小さなデジタル商品を試す場所. Updated 2026-06-19 17:48:15.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Small Offer Lab">
  <meta name="twitter:description" content="小さなデジタル商品を試す場所. Updated 2026-06-19 17:48:15.">
  <link rel="canonical" href="https://small-offer-lab.vercel.app/">
  <meta property="og:url" content="https://small-offer-lab.vercel.app/">
  <meta property="og:image" content="https://small-offer-lab.vercel.app/assets/packages/2026-06-19/cover.png">
  <meta name="twitter:image" content="https://small-offer-lab.vercel.app/assets/packages/2026-06-19/cover.png">

  <style>
    :root {
      color-scheme: light;
      --ink: #17202e;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #ffffff;
      --bg: #f3f6f8;
      --accent: #0f766e;
      --accent-soft: #e6f4f1;
      --gold: #d99a21;
      --gold-soft: #fff4da;
      --danger-soft: #fff1f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Yu Gothic", Meiryo, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #f9fbfb 0, var(--bg) 420px),
        var(--bg);
      line-height: 1.7;
    }
    header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .wrap {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
    }
    h1, h2 {
      letter-spacing: 0;
      line-height: 1.35;
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(30px, 4vw, 52px);
    }
    header h1 {
      font-size: 22px;
    }
    h2 {
      margin: 28px 0 10px;
      font-size: 20px;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    main {
      padding: 24px 0 64px;
    }
    .grid {
      display: grid;
      gap: 14px;
    }
    .card, .content {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(280px, 0.88fr);
      gap: 28px;
      align-items: center;
      padding: 28px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(23, 32, 46, 0.08);
    }
    .hero-copy {
      display: grid;
      gap: 14px;
    }
    .eyebrow {
      width: fit-content;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--gold-soft);
      color: #7a520e;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .hero-title {
      margin: 0;
      font-size: clamp(28px, 4.6vw, 56px);
      line-height: 1.16;
    }
    .hero-lead {
      margin: 0;
      color: #394455;
      font-size: 17px;
    }
    .price-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .price {
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfcfe;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .hero-note {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .cover-wrap {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #f7fbfa);
    }
    .cover {
      width: 100%;
      border: 0;
      border-radius: 8px;
      display: block;
      margin: 0;
    }
    .card .cover {
      width: 100%;
    }
    .card {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .card-body {
      min-width: 0;
    }
    .card-lead {
      margin: 0;
      color: #394455;
      font-size: 15px;
    }
    .value-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0 0;
    }
    .value {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfe;
    }
    .value strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }
    .value p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .section-kicker {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }
    .compare-grid, .faq-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .panel, .faq, .final-cta {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .panel h2, .faq h3, .final-cta h2 {
      margin-top: 0;
    }
    .panel.before {
      background: var(--danger-soft);
    }
    .panel.after {
      background: var(--accent-soft);
    }
    .panel ul, .faq p {
      margin-bottom: 0;
    }
    .final-cta {
      display: grid;
      gap: 12px;
      margin-top: 14px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(23, 32, 46, 0.07);
    }
    .final-cta p {
      margin: 0;
      color: var(--muted);
    }
    .sticky-buy {
      position: sticky;
      bottom: 0;
      z-index: 20;
      margin: 22px auto 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(10px);
      box-shadow: 0 -12px 36px rgba(23, 32, 46, 0.09);
    }
    .sticky-buy-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .sticky-buy strong {
      display: block;
      line-height: 1.3;
    }
    .sticky-buy span {
      color: var(--muted);
      font-size: 13px;
    }
    .date {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
    }
    .meta span {
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfcfe;
    }
    pre {
      margin: 0;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfe;
      font-family: inherit;
      font-size: 13px;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    a, .button {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 8px 14px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 10px 26px rgba(15, 118, 110, 0.20);
    }
    .button.secondary {
      background: var(--accent-soft);
      color: var(--accent);
      box-shadow: none;
    }
    a:hover { text-decoration: underline; }
    .empty {
      color: var(--muted);
    }
    .content p {
      margin: 0 0 12px;
    }
    .content ul {
      margin: 0 0 14px;
      padding-left: 22px;
    }
    .content h1 {
      font-size: 26px;
    }
    .deliverables {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .deliverable {
      min-height: 112px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfe;
    }
    .deliverable strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .deliverable span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .steps-list {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
      padding: 0;
      list-style: none;
      counter-reset: step;
    }
    .steps-list li {
      counter-increment: step;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--accent-soft);
      font-size: 14px;
    }
    .steps-list li::before {
      content: counter(step);
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      margin-right: 6px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      font-size: 12px;
    }
    .sample-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      margin-top: 14px;
    }
    .sample-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .sample-card h2 {
      margin-top: 0;
    }
    .sample-card pre {
      max-height: 240px;
    }
    details.full-material {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      padding: 0;
    }
    details.full-material summary {
      cursor: pointer;
      padding: 14px 16px;
      color: var(--accent);
      font-weight: 800;
    }
    details.full-material .details-body {
      border-top: 1px solid var(--line);
      padding: 16px;
    }
    @media (max-width: 760px) {
      header { position: static; }
      .hero {
        grid-template-columns: 1fr;
        padding: 20px;
      }
      .card {
        grid-template-columns: 1fr;
      }
      .value-grid {
        grid-template-columns: 1fr;
      }
      .compare-grid, .faq-grid {
        grid-template-columns: 1fr;
      }
      .deliverables, .steps-list, .sample-grid {
        grid-template-columns: 1fr;
      }
      .sticky-buy-inner {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>

</body>
